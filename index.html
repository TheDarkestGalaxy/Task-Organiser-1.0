<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Organiser</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div>
          <h1 class="logo">Task Organiser</h1>
          <p class="tagline">Stay on top of what matters</p>
        </div>
        <div class="header-stats" id="header-stats">
          <div class="stat">
            <span class="stat-value" id="stat-active">0</span>
            <span class="stat-label">Active</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-overdue">0</span>
            <span class="stat-label">Overdue</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-done">0</span>
            <span class="stat-label">Done</span>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="panel create-section">
        <h2 class="panel-title">New Task</h2>
        <form id="task-form" class="task-form">
          <div class="form-grid">
            <div class="field field-wide">
              <label class="field-label" for="task-title">Title</label>
              <input
                type="text"
                id="task-title"
                class="input"
                placeholder="What needs to be done?"
                required
                autocomplete="off"
              />
            </div>
            <div class="field">
              <label class="field-label" for="task-importance">Importance</label>
              <select id="task-importance" class="select">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
            <div class="field">
              <label class="field-label" for="task-due-date">Due date</label>
              <input type="date" id="task-due-date" class="input input-date" />
            </div>
            <div class="field">
              <label class="field-label" for="task-category">Category</label>
              <input
                type="text"
                id="task-category"
                class="input"
                placeholder="Work, Personal…"
                list="category-suggestions"
                autocomplete="off"
              />
              <datalist id="category-suggestions"></datalist>
            </div>
            <div class="field field-wide">
              <label class="field-label" for="task-description">Details <span class="optional">optional</span></label>
              <textarea
                id="task-description"
                class="textarea"
                placeholder="Add any extra context…"
                rows="2"
              ></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Task</button>
          </div>
        </form>
      </section>

      <section class="panel filters-section">
        <div class="filters-header">
          <h2 class="panel-title">Filters</h2>
          <p class="task-count" id="task-count">0 tasks</p>
        </div>

        <div class="filter-rows">
          <div class="filter-row">
            <span class="filter-label">Status</span>
            <div class="filters" id="status-filters">
              <button class="filter-btn active" data-filter="all">All</button>
              <button class="filter-btn" data-filter="active">Active</button>
              <button class="filter-btn" data-filter="completed">Completed</button>
              <button class="filter-btn" data-filter="bookmarked">Bookmarked</button>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-label">Importance</span>
            <div class="filters" id="importance-filters">
              <button class="filter-btn" data-filter="low">Low</button>
              <button class="filter-btn" data-filter="medium">Medium</button>
              <button class="filter-btn" data-filter="high">High</button>
              <button class="filter-btn" data-filter="critical">Critical</button>
            </div>
          </div>
          <div class="filter-row hidden" id="category-filter-group">
            <span class="filter-label">Category</span>
            <div class="filters" id="category-filters"></div>
          </div>
        </div>
      </section>

      <section class="tasks-section">
        <ul id="task-list" class="task-list"></ul>
        <div id="empty-state" class="empty-state panel">
          <div class="empty-icon">📋</div>
          <p class="empty-title">No tasks yet</p>
          <p class="empty-subtitle">Create your first task above to get started</p>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
